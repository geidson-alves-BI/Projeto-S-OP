<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Operion</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f4f7fb;
        --card: #ffffff;
        --text: #1d2a3a;
        --muted: #4d6078;
        --accent: #0b5cff;
        --border: #d8e1ee;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: radial-gradient(circle at top right, #dfe9f9 0%, var(--bg) 55%);
        color: var(--text);
        display: grid;
        place-items: center;
        padding: 24px;
      }

      .panel {
        width: min(760px, 100%);
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 28px;
        box-shadow: 0 16px 40px rgba(22, 35, 56, 0.12);
      }

      h1 {
        margin: 0 0 12px;
        font-size: 1.5rem;
      }

      p {
        margin: 0 0 12px;
        line-height: 1.45;
        color: var(--muted);
      }

      code {
        display: block;
        margin-top: 6px;
        background: #f0f4fa;
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 10px 12px;
        color: #0f2039;
        white-space: pre-wrap;
        word-break: break-word;
      }

      .actions {
        margin-top: 18px;
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }

      button {
        appearance: none;
        border: 1px solid var(--accent);
        background: var(--accent);
        color: #fff;
        border-radius: 8px;
        font-size: 0.95rem;
        padding: 10px 14px;
        cursor: pointer;
      }

      button.secondary {
        background: #fff;
        color: var(--accent);
      }
    </style>
  </head>
  <body>
    <main class="panel">
      <h1>Operion nao conseguiu carregar</h1>
      <p>
        A interface principal falhou ao iniciar. O aplicativo segue registrando os detalhes em log.
      </p>
      <p id="reasonLabel"></p>
      <code id="detailsBox"></code>
      <p>
        Verifique os logs em:
        <code id="logsPath">%APPDATA%\Operion\logs</code>
      </p>
      <div class="actions">
        <button type="button" onclick="location.reload()">Tentar novamente</button>
        <button class="secondary" type="button" onclick="window.close()">Fechar</button>
      </div>
    </main>

    <script>
      const params = new URLSearchParams(window.location.search);
      const reason = params.get("reason") || "Falha inesperada no renderer.";
      const details = params.get("details") || "Sem detalhes adicionais.";
      const logsPath = params.get("logsPath") || "%APPDATA%\\Operion\\logs";

      document.getElementById("reasonLabel").textContent = reason;
      document.getElementById("detailsBox").textContent = details;
      document.getElementById("logsPath").textContent = logsPath;
    </script>
  </body>
</html>
